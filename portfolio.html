<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suraj MJ | Portfolio Home</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Poppins', sans-serif;
    background-color: #F8FAFC;
    color: #0F172A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}
/* Navigation */
nav {
    background-color: #0F172A;
    padding: 20px 40px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
}
nav a {
    color: #F8FAFC;
    margin-left: 30px;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    transition: color 0.3s ease;
}
nav a:hover, nav a.active { color: #F59E0B; }

/* Hero Wrapper */
.hero-wrapper {
    display: flex;
    max-width: 1200px;
    margin: auto;
    padding: 60px 40px;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
    flex-grow: 1;
}
.text-section {
    max-width: 600px;
    animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.tagline {
    background-color: #FEF3C7;
    color: #D97706;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    display: inline-block;
    margin-bottom: 20px;
}
.text-section h1 {
    font-size: 48px;
    font-weight: 700;
    line-height: 1.2;
    color: #0F172A;
    margin-bottom: 15px;
}
.text-section h1 span { color: #F59E0B; }
.one-liner {
    font-size: 18px;
    color: #475569;
    line-height: 1.6;
    margin-bottom: 35px;
}
.action-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 35px;
}
.btn {
    padding: 12px 28px;
    border-radius: 8px;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    font-size: 15px;
}
.btn-primary { background-color: #0F172A; color: #F8FAFC; }
.btn-primary:hover { background-color: #1E293B; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(15,23,42,0.15); }
.btn-secondary { background-color: transparent; color: #0F172A; border: 2px solid #0F172A; }
.btn-secondary:hover { background-color: #0F172A; color: #F8FAFC; transform: translateY(-3px); }

.social-links { display: flex; gap: 20px; }
.social-links a { color: #64748B; font-weight: 500; text-decoration: none; transition: color 0.2s; font-size: 14px; }
.social-links a:hover { color: #F59E0B; }

/* Image Container */
.image-box {
    width: 340px;
    height: 440px;
    background-color: #F59E0B;
    border-radius: 24px;
    padding: 12px;
    box-shadow: 0 20px 40px rgba(245,158,11,0.15);
    animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 16px;
    border: 4px solid #F8FAFC;
}

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Mobile Styling */
@media (max-width: 768px) {
    nav { padding: 15px 20px; justify-content: center; }
    nav a { margin: 0 10px; font-size: 14px; }
    .hero-wrapper { flex-direction: column-reverse; text-align: center; padding: 40px 20px; gap: 40px; }
    .text-section h1 { font-size: 36px; }
    .action-buttons { justify-content: center; }
    .social-links { justify-content: center; }
    .image-box { width: 280px; height: 360px; }
}
</style>
</head>
<body>
<nav>
    <a href="portfolio.html" class="active">Home</a>
    <a href="about.html">About & Skills</a>
    <a href="pro.html">Projects</a>
    <a href="contact.html">Experience & Contact</a>
</nav>
<main class="hero-wrapper">
    <div class="text-section">
        <span class="tagline">IMCA Student | Aspiring Web Developer | Creative Thinker</span>
        <h1>Hello, I am <br><span>Suraj MJ</span></h1>
        <p class="one-liner">"I design and build websites that solve real problems"</p>
        <div class="action-buttons">
            
            <a href="pro.html" class="btn btn-primary">View Projects</a>
            <a href="contact.html" class="btn btn-secondary">Contact Me</a>
        </div>
        <div class="social-links">
            <a href="www.linkedin.com/in/suraj-m-j-3605a3398">LinkedIn</a>
            <a href="https://github.com/surajmj2004">GitHub</a>
            <a href="mailto:surajmj@depaul.edu.in">Email</a>
        </div>
    </div>
    <div class="image-box">
        <img src="./sura.jpeg" alt="Suraj MJ Portrait">
    </div>
</main>
</body>
</html>
